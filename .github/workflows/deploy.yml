name: Deploy Docker Image to AWS ECR

#on:
#  push:
#    branches: [ "main" ]
on:
  workflow_dispatch: # This allows you to run it MANUALLY with a button click instead!    

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull your repository files into the runner
    - name: Check out code
      uses: actions/checkout@v4

    # Step 2: Build the image and push using the action parameters you picked
    - name: Build & push Docker image
      uses: mr-smithers-excellent/docker-build-push@v7
      with:
        image: my-app   # This is your actual ECR repository name
        tags: latest
        registry: 285229572098.dkr.ecr.ap-south-2.amazonaws.com # Remove the "/my-app" from the end here
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
